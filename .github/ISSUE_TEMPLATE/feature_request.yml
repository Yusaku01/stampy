name: Feature request
description: Suggest an improvement or new capability.
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user need or workflow should this solve?
      placeholder: I want to...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the smallest useful version of the change.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Core package
        - Studio
        - Vanilla example
        - Documentation
        - CI or repository setup
        - Not sure
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any simpler workaround or API shape you considered?
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Mockups, links, related issues, or example project JSON.
